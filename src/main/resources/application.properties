spring.profiles.include=API-KEY

spring.application.name=security1
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/test?characterEncoding=UTF-8&serverTimezone=UTC
spring.datasource.username=${DATABASE-USERNAME}
spring.datasource.password=${DATABASE-PASSWORD}

##JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.show_sql=true
spring.jpa.properties.hibernate.format_sql=true

##auth2

#google
spring.security.oauth2.client.registration.google.client-id=${GOOGLE-CLIENT}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE-KEY}
spring.security.oauth2.client.registration.google.scope=profile,email

#facebook
spring.security.oauth2.client.registration.facebook.client-id=${FACEBOOK-CLIENT}
spring.security.oauth2.client.registration.facebook.client-secret=${FACEBOOK-KEY}
spring.security.oauth2.client.registration.facebook.scope=public_profile

#naver
spring.security.oauth2.client.registration.naver.client-id=${NAVER-CLIENT}
spring.security.oauth2.client.registration.naver.client-secret=${NAVER-KEY}
spring.security.oauth2.client.registration.naver.scope=name,email
spring.security.oauth2.client.registration.naver.client-name=Naver
spring.security.oauth2.client.registration.naver.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.naver.redirect-uri=http://localhost:8080/login/oauth2/code/naver
#???? ??? ??? ??? redirect-url? ????.

spring.security.oauth2.client.provider.naver.authorization-uri=https://nid.naver.com/oauth2.0/authorize
spring.security.oauth2.client.provider.naver.token-uri:https://nid.naver.com/oauth2.0/token
spring.security.oauth2.client.provider.naver.user-info-uri:https://openapi.naver.com/v1/nid/me
spring.security.oauth2.client.provider.naver.user-name-attribute: response